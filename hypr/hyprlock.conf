# FALLOUT TERMINAL THEME
general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

# ARKA PLAN (Karanlık ve Grenli)
background {
    monitor =
    path = screenshot
    color = rgb(10, 20, 10)
    blur_passes = 3
    noise = 0.05 # CRT kirliliği için gren ekledik
    contrast = 0.5 # Düşük kontrast, eski ekran havası
    brightness = 0.3
}

# SAAT (Terminal Yeşili)
label {
    monitor =
    text = $TIME
    color = rgb(51, 255, 51)
    font_size = 100
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 1
    shadow_color = rgb(0, 100, 0)
}

# TERMİNAL BAŞLIĞI
label {
    monitor =
    text = ROBCO INDUSTRIES (TM) TERMLINK PROTOCOL
    color = rgb(51, 255, 51)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 20, -20
    halign = left
    valign = top
}

# PAROLA KUTUSU (Fallout Terminal Stili)
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(51, 255, 51) # Parlayan yeşil çerçeve
    inner_color = rgb(0, 20, 0) # Çok koyu yeşil arka plan
    font_color = rgb(51, 255, 51)
    fade_on_empty = false
    placeholder_text = <span foreground="##33ff33">ENTER PASSWORD_</span>
    hide_input = false
    rounding = 0 # Kare köşeler, terminal gibi
    check_color = rgb(51, 255, 51)
    fail_color = rgb(255, 0, 0)
    position = 0, -50
    halign = center
    valign = center
}

# DURUM MESAJI
label {
    monitor =
    text = > SET TERMINAL/INQUIRE
    color = rgba(51, 255, 51, 0.6)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 20, -50
    halign = left
    valign = top
}

label {
    monitor =
    text = > RND CODE: $USER_AUTH_SUCCESS
    color = rgba(51, 255, 51, 0.6)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 20, -70
    halign = left
    valign = top
}
